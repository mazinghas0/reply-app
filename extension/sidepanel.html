<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리플라이</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header class="header">
    <img src="icons/icon48.png" alt="리플라이" />
    <h1>리플라이</h1>
  </header>

  <main class="main">
    <div class="textarea-wrap">
      <textarea id="text" placeholder="답장할 메시지를 붙여넣으세요..." maxlength="1200"></textarea>
      <span class="char-count" id="charCount">0 / 1200</span>
    </div>

    <div class="modes">
      <button class="mode-btn active" data-mode="generate">답장 만들기</button>
      <button class="mode-btn" data-mode="review">검토</button>
      <button class="mode-btn" data-mode="refine">다듬기</button>
    </div>

    <button class="send-btn" id="send" disabled>리플라이로 보내기</button>

    <p class="hint">전송 시 새 탭에서 리플라이가 열립니다</p>
  </main>

  <footer class="footer">
    <button class="link-btn" id="openFull">리플라이 전체 화면 열기</button>
    <p class="sub-hint">텍스트를 선택 후 우클릭해도 사용할 수 있어요</p>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
